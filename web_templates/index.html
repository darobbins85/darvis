<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darvis - Voice Assistant</title>
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <style>
    /* =============================================================================
       Base Styles - Reset and fundamental element styling
       ============================================================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* =============================================================================
       Header - Top navigation bar with logo
       ============================================================================= */
    .header {
      background: rgba(15, 15, 35, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(42, 42, 78, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(45deg, #00d4ff, #007aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-left: 1rem;
    }

    .logo img {
      height: 40px;
      width: auto;
      transition: all 0.3s ease;
    }

    /* =============================================================================
       Microphone Button - Voice input toggle
       ============================================================================= */
    /* Listening controls below input */
    .listening-controls {
      display: flex;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .listening-toggle {
      background: rgba(0, 122, 255, 0.1);
      border: 1px solid rgba(0, 122, 255, 0.3);
      color: #00d4ff;
      padding: 0.5rem;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .listening-toggle.active {
      background: rgba(255, 0, 0, 0.4);
      border-color: #ff0000;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
      animation: listeningPulse 2s infinite;
    }

    @keyframes listeningPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    .listening-toggle:hover {
      background: rgba(0, 122, 255, 0.15);
    }

    /* =============================================================================
       Chat Container - Main message area layout
       ============================================================================= */
    .chat-container {
      position: relative;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      padding: 1rem;
      /* No margin-bottom needed - input is now inside */
      /* Dynamic height that fills available space */
      min-height: calc(100vh - 200px);
      /* Minimum space accounting for header + input + margins */
      box-sizing: border-box;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
      /* Dynamic height within container */
      min-height: 200px;
      /* Minimum usable height */
      /* Add subtle border */
      border: 1px solid rgba(42, 42, 78, 0.3);
      border-radius: 8px;
      background: rgba(26, 26, 46, 0.3);
      /* Ensure space at bottom when scrolled */
      padding-bottom: 20px;
    }

    /* =============================================================================
       Messages - Chat bubble styling
       ============================================================================= */
    .message {
      margin-bottom: 1rem;
      animation: slideIn 0.3s ease-out;
    }

    .message.user {
      display: flex;
      justify-content: flex-end;
    }

    .message.ai {
      display: flex;
      justify-content: flex-start;
    }

    .message.system {
      display: flex;
      justify-content: center;
    }

    .message-bubble {
      max-width: 65%;
      padding: 0.75rem 1rem;
      margin: 20px;
      border-radius: 18px;
      position: relative;
      word-wrap: break-word;
      line-height: 1.4;
      font-size: 0.9rem;
    }

    .message.user .message-bubble {
      background: #007AFF;
      color: white;
      border-bottom-right-radius: 6px;
      margin-left: 3rem;
    }

    .message.ai .message-bubble {
      background: #E5E5EA;
      color: #1C1C1E;
      border-bottom-left-radius: 6px;
      margin-right: 3rem;
    }

    .message.system .message-bubble {
      background: rgba(242, 242, 247, 0.9);
      color: #3C3C43;
      border-radius: 12px;
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      margin: 20px;
      max-width: 60%;
      text-align: center;
    }

    .input-container {
      background: rgba(15, 15, 35, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(42, 42, 78, 0.5);
      border-radius: 12px;
      padding: 1rem;
      margin-top: 1rem;
      /* Centered at bottom of chat container */
      position: relative;
      width: 100%;
      box-sizing: border-box;
    }

    /* =============================================================================
       Input Form - Text input and send button
       ============================================================================= */
    .input-form {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin: 0 auto;
      box-sizing: border-box;
      padding-left: 80px;
    }

    .input-form+.controls {
      max-width: 600px;
      margin: 0.5rem auto 0;
      padding-left: 60px;
    }

    /* =============================================================================
       Message Input - Text field styling
       ============================================================================= */
    .message-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(42, 42, 78, 0.5);
      border-radius: 22px;
      background: rgba(26, 26, 46, 0.8);
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .message-input:focus {
      border-color: #007AFF;
      box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.2);
    }

    .send-button {
      background: #007AFF;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 22px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .send-button:hover {
      background: #0056CC;
      transform: translateY(-1px);
    }

    .darvis-logo {
      position: relative;
      display: inline-block;
      width: 75px;
      height: 75px;
    }

    .darvis-logo img {
      position: relative;
      z-index: 1;
      height: 75px;
      width: 75px;
      display: block;
    }

    /* Logo inside input container, left side */
    .darvis-logo-wrapper-bottom {
      position: absolute;
      left: 10px;
      bottom: 50%;
      transform: translateY(50%);
    }

    /* AI Processing Indicator */
    .cancel-button {
      background: none;
      border: none;
      color: #ff4444;
      cursor: pointer;
      font-size: 14px;
      margin-left: 10px;
      padding: 2px 6px;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .cancel-button:hover {
      background: rgba(255, 68, 68, 0.2);
      transform: scale(1.1);
    }

    #ai-dots {
      animation: blink 1.5s infinite;
    }

    @keyframes blink {

      0%,
      50% {
        opacity: 1;
      }

      51%,
      100% {
        opacity: 0.3;
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(15, 15, 35, 0.5);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(42, 42, 78, 0.5);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.5);
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      .chat-container {
        margin-bottom: 10px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 10px;
        padding-right: 10px;
      }

      .header {}

      .input-container {
        padding: 1rem;
        margin-top: 50px;
      }

      .message-bubble {
        max-width: 80%;
        font-size: 0.85rem;
      }

      .message.user .message-bubble {
        margin-left: 2rem;
      }

      .message.ai .message-bubble {
        margin-right: 2rem;
      }

      .code-block {
        max-width: 100%;
        font-size: 0.75rem;
      }
    }

    /* Code block styling */
    .code-block {
      background: #1e1e2e;
      border-radius: 8px;
      margin: 0.75rem 0;
      overflow: hidden;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .code-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2a2a3e;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #3a3a5e;
    }

    .code-block-language {
      color: #00d4ff;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .code-block-copy {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: #00d4ff;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.7rem;
      transition: all 0.2s ease;
    }

    .code-block-copy:hover {
      background: rgba(0, 212, 255, 0.2);
    }

    .code-block-copy.copied {
      background: rgba(0, 255, 136, 0.2);
      border-color: rgba(0, 255, 136, 0.5);
      color: #00ff88;
    }

    .code-block pre {
      margin: 0;
      padding: 0.75rem;
      overflow-x: auto;
      white-space: pre;
    }

    .code-block code {
      font-family: inherit;
      color: #e0e0e0;
    }

    /* JSON syntax highlighting - lighter colors for dark background */
    .json-key {
      color: #ff79c6;
    }

    .json-string {
      color: #a6e3a1;
    }

    .json-number {
      color: #89b4fa;
    }

    .json-boolean {
      color: #f38ba8;
    }

    .json-null {
      color: #bac2de;
    }

    .json-bracket {
      color: #cdd6f4;
    }
    #mic-btn.recording {
        background: #ff4444;
        animation: pulse 1s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }

    /* Session sidebar styles */
    .app-container {
        display: flex;
        height: 100vh;
    }

    .sessions-sidebar {
        width: 250px;
        background: rgba(15, 15, 35, 0.95);
        border-right: 1px solid rgba(42, 42, 78, 0.5);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        transition: width 0.3s ease, margin 0.3s ease;
    }

    .sessions-sidebar.collapsed {
        width: 0;
        margin-left: -1px;
        overflow: hidden;
    }

    #sidebar-toggle {
        position: fixed;
        top: 10px;
        left: 260px;
        z-index: 1000;
        background: rgba(0, 212, 255, 0.2);
        border: 1px solid rgba(0, 212, 255, 0.5);
        color: #00d4ff;
        width: 28px;
        height: 28px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: left 0.3s ease;
    }

    #sidebar-toggle:hover {
        background: rgba(0, 212, 255, 0.3);
    }

    body.sidebar-collapsed #sidebar-toggle {
        left: 10px;
    }

    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        border-bottom: 1px solid rgba(42, 42, 78, 0.5);
    }

    .sidebar-header h3 {
        margin: 0;
        font-size: 1rem;
        color: #00d4ff;
    }

    #new-session-btn {
        background: rgba(0, 255, 136, 0.2);
        border: 1px solid rgba(0, 255, 136, 0.5);
        color: #00ff88;
        width: 28px;
        height: 28px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #new-session-btn:hover {
        background: rgba(0, 255, 136, 0.3);
    }

    .sessions-list {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem;
    }

    .session-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        margin-bottom: 0.25rem;
        transition: background 0.2s;
    }

    .session-item:hover {
        background: rgba(255, 255, 255, 0.05);
    }

    .session-item.active {
        background: rgba(0, 212, 255, 0.2);
        border-left: 3px solid #00d4ff;
    }

    .session-item .session-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .session-item .delete-session {
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        font-size: 0.9rem;
        padding: 0.25rem;
        opacity: 0;
        transition: opacity 0.2s;
    }

    .session-item:hover .delete-session {
        opacity: 1;
    }

    .session-item .delete-session:hover {
        color: #ff6b6b;
    }

    .sidebar-footer {
        padding: 1rem;
        border-top: 1px solid rgba(42, 42, 78, 0.5);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .sidebar-footer .username {
        font-size: 1rem;
        font-weight: 600;
        color: #00d4ff;
    }

    .sidebar-footer a {
        color: #00d4ff;
        text-decoration: none;
        font-size: 0.85rem;
    }

    .sidebar-footer a:hover {
        text-decoration: underline;
    }

    .chat-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 100%;
        padding: 1rem;
        overflow-y: auto;
    }
  </style>


</head>

<body>

  <button id="sidebar-toggle" title="Toggle Sessions">←</button>

  <div class="app-container">
    <!-- Session Sidebar -->
    <aside class="sessions-sidebar" id="sessions-sidebar">
      <div class="sidebar-header">
        <h3>Sessions</h3>
        <button id="new-session-btn" title="New Session">+</button>
      </div>
      <div id="sessions-list" class="sessions-list">
        <!-- Sessions loaded dynamically -->
      </div>
      <div class="sidebar-footer">
        <span id="username-display" class="username">Loading...</span>
        <a href="/logout">Logout</a>
      </div>
    </aside>

    <!-- Chat Area -->
    <div class="chat-wrapper">
      <div class="chat-container">

        <div id="chat-messages" class="chat-messages">
          <div class="message system">
            <div class="message-bubble">
              👋 Welcome to Darvis! I'm your AI voice assistant. Type a message or enable listening mode to get started.
            </div>
          </div>
          <!-- AI Processing Indicator -->
          <div id="ai-processing-indicator" class="message ai" style="display: none;">
            <div class="message-bubble">
              <span id="ai-dots">...</span>
              <span id="ai-timer">(0s)</span>
              <button id="cancel-ai" class="cancel-button" title="Cancel AI request">❌</button>
            </div>
          </div>
        </div>

        <!-- Input container centered at bottom of chat -->
        <div class="input-container">

          <!-- Darvis logo at bottom left -->
          <div class="darvis-logo-wrapper-bottom">
            <div class="darvis-logo">
              <img id="darvis-logo-img" src="/static/darvis-logo.png">
            </div>
          </div>

          <div>
            <form id="message-form" class="input-form">
              <input type="text" id="message-input" class="message-input" placeholder="Type your message..."
                autocomplete="off">
              <button type="submit" class="send-button">
                Send ✉️
              </button>
              <button id="mic-btn" onclick="toggleMic()" title="Click to talk" class="listening-toggle">🎤</button>
            </form>
            <span id="voice-status"></span>
          </div>

      <script>
        /* =============================================================================
           Initialization - Socket connection and DOM element references
           ============================================================================= */
        const socket = io();
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const messageForm = document.getElementById('message-form');
        const listeningToggle = document.getElementById('mic-btn');
        const micBtn = document.getElementById('mic-btn');

        /* =============================================================================
           State Variables - Track application state
           ============================================================================= */
        let listeningEnabled = false;
        let currentEyeState = 'idle'; // idle, wake, ai
        let recognition = null;
        let recognitionActive = false;
        let waitingForCommand = false;
        let currentSessionId = null;
        let commandTimeout = null;
        let aiProcessing = false;
        let aiStartTime = null;
        let aiTimerInterval = null;
        let restartPending = false;

        /* =============================================================================
           Eye State Control - Darvis logo image switching based on state
           ============================================================================= */
        // Eye control functions
        function setEyeState(state) {
          console.log('👁️ setEyeState called with:', state);
          const logoImg = document.getElementById('darvis-logo-img');
          const timestamp = Date.now();

          // Change the logo image based on state
          if (state === 'wake') {
            console.log('👁️ Setting logo to green eyes');
            logoImg.src = '/static/darvis-logo-hires-green-eyes.png?v=' + timestamp;
          } else if (state === 'ai') {
            console.log('👁️ Setting logo to red eyes');
            logoImg.src = '/static/darvis-logo-hires-red-eyes.png?v=' + timestamp;
          } else {
            console.log('👁️ Setting logo to base');
            logoImg.src = '/static/darvis-logo.png?v=' + timestamp;
          }

          currentEyeState = state;
        }

        /* =============================================================================
           AI Processing - Show/hide processing indicator during AI queries
           ============================================================================= */
        // AI Processing functions
        function startAiProcessing() {
          console.log('🤖 Starting AI processing...');
          aiProcessing = true;
          aiStartTime = Date.now();
          setEyeState('ai');

          // Show processing indicator
          const indicator = document.getElementById('ai-processing-indicator');
          indicator.style.display = 'block';

          // Start timer
          aiTimerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - aiStartTime) / 1000);
            document.getElementById('ai-timer').textContent = `(${elapsed}s)`;
          }, 1000);

          // Scroll to show the indicator
          indicator.scrollIntoView({behavior: 'smooth'});
        }

        function stopAiProcessing() {
          console.log('🤖 Stopping AI processing...');
          aiProcessing = false;
          clearInterval(aiTimerInterval);
          setEyeState('idle');

          // Hide processing indicator
          document.getElementById('ai-processing-indicator').style.display = 'none';
        }

        // Cancel AI processing
        document.addEventListener('DOMContentLoaded', () => {
          document.getElementById('cancel-ai').addEventListener('click', () => {
            console.log('❌ User cancelled AI request');
            stopAiProcessing();
            socket.emit('cancel_ai_request');
          });
        });

        /* =============================================================================
           Speech Recognition - Web Speech API initialization and handlers
           ============================================================================= */
        // Initialize speech recognition
        function initSpeechRecognition() {
          if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            // Try to improve recognition
            if (recognition.hasOwnProperty('maxAlternatives')) {
              recognition.maxAlternatives = 1;
            }

            recognition.onstart = function () {
              console.log('🎤 Speech recognition started');
              recognitionActive = true;
            };

            recognition.onresult = function (event) {
              const text = event.results[0][0].transcript;
              console.log('🎤 Browser heard:', text);
              socket.emit('speech_recognized', {text: text});
            };

            recognition.onerror = function (event) {
              console.error('🎤 Speech recognition error:', event.error);

              // Handle different error types
              if (event.error === 'no-speech') {
                console.log('🎤 No speech detected, restarting...');
                // Don't show "no-speech" errors to user, just restart
                if (listeningEnabled && !waitingForCommand && !restartPending) {
                  setTimeout(() => startListening(), 1500); // Wait longer before restart
                }
              } else if (event.error === 'not-allowed') {
                console.error('🎤 Microphone access denied:', event.error);
                listeningEnabled = false;
                listeningToggle.classList.remove('active');
              } else if (event.error === 'network') {
                console.error('🎤 Speech recognition network error:', event.error);
              } else {
                console.error('🎤 Speech recognition error:', event.error);
              }
            };

            recognition.onend = function () {
              console.log('🎤 Speech recognition ended');
              recognitionActive = false;
              // Restart listening if still enabled and not waiting for command
              if (listeningEnabled && !waitingForCommand && !restartPending) {
                setTimeout(() => startListening(), 1000);
              }
            };

            console.log('🎤 Speech recognition initialized');
          } else {
            console.error('🎤 Speech recognition not supported in this browser');
          }
        }

        function startListening() {
          if (recognition && listeningEnabled && !restartPending) {
            console.log('🎤 Starting browser speech recognition...');
            restartPending = true;
            try {
              recognition.start();
              restartPending = false;
            } catch (error) {
              console.error('🎤 Failed to start speech recognition:', error);
              restartPending = false;
              if (error.name === 'InvalidStateError') {
                console.log('🎤 Recognition already started, will retry later...');
                // Don't retry immediately to avoid spam
                setTimeout(() => {
                  if (listeningEnabled && !waitingForCommand) {
                    startListening();
                  }
                }, 2000);
              }
            }
          }
        }

        function stopListening() {
          if (recognition && recognitionActive) {
            console.log('🎤 Stopping browser speech recognition...');
            recognitionActive = false;
            try {
              recognition.stop();
            } catch (error) {
              console.error('🎤 Error stopping recognition:', error);
            }
          }
        }

        /* =============================================================================
           Event Handlers - Form submission and microphone toggle
           ============================================================================= */
        // Handle form submission
        messageForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const message = messageInput.value.trim();
          if (message) {
            // If we were waiting for a command, stop waiting
            if (waitingForCommand) {
              clearTimeout(commandTimeout);
              waitingForCommand = false;
              console.log('📝 Manual message sent, stopping command wait');
            }
            socket.emit('chat_message', {message: message, session_id: currentSessionId});
            messageInput.value = '';
            startAiProcessing();
          }
        });

        // Handle listening toggle
        listeningToggle.addEventListener('click', () => {
          listeningEnabled = !listeningEnabled;

          if (listeningEnabled) {
            listeningToggle.classList.add('active');
            setEyeState('wake'); // Green eyes when listening
            console.log('🎤 Listening mode enabled - using browser microphone');

            // Test microphone access
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
              navigator.mediaDevices.getUserMedia({audio: true})
                .then(function (stream) {
                  console.log('🎤 Microphone access granted');
                  stream.getTracks().forEach(track => track.stop()); // Stop the test stream
                  startListening();
                })
                .catch(function (error) {
                  console.error('🎤 Microphone access denied:', error);
                  listeningEnabled = false;
                  listeningToggle.classList.remove('active');
                });
            } else {
              // Fallback for older browsers
              startListening();
            }
          } else {
            listeningToggle.classList.remove('active');
            console.log('🎤 Listening mode disabled');
            stopListening();
            console.log('🎤 Setting eye state to idle');
            setEyeState('idle'); // Return to idle when listening disabled
            // Clear any pending command timeout
            if (commandTimeout) {
              clearTimeout(commandTimeout);
              commandTimeout = null;
            }
            waitingForCommand = false;
          }
        });

        /* =============================================================================
           Socket Event Handlers - Server-to-client communication
           ============================================================================= */
        // Handle incoming user messages
        socket.on('user_message', (data) => {
          addMessage(data.message, 'user');
        });

        // Handle incoming AI messages
        socket.on('ai_message', (data) => {
          stopAiProcessing();
          // If listening mode is still enabled, restart speech recognition for next command
          if (listeningEnabled) {
            console.log('🔄 Restarting speech recognition after AI response...');
            setEyeState('wake'); // Green eyes while waiting for next command
            setTimeout(() => {
              if (listeningEnabled) {
                startListening();
              }
            }, 1000);
          }
          addMessage(data.message, 'ai');
        });

        // Handle wake word detection
        socket.on('wake_word', (data) => {
          console.log('🎉 Wake word detected! Eyes turning green...');
          setEyeState('wake'); // Green eyes for wake word
        });

        // Handle AI cancellation
        socket.on('ai_cancelled', (data) => {
          console.log('❌ AI request cancelled');
          stopAiProcessing();
          // If listening mode is still enabled, restart speech recognition
          if (listeningEnabled) {
            console.log('🔄 Restarting speech recognition after AI cancellation...');
            setEyeState('wake'); // Green eyes while waiting for next command
            setTimeout(() => {
              if (listeningEnabled) {
                startListening();
              }
            }, 1000);
          }
        });

        // Handle speech recognized from browser
        socket.on('speech_recognized_response', (data) => {
          const text = data.text;
          console.log('📝 Processing recognized speech:', text);

          // If listening mode is enabled, process any speech as a command
          if (listeningEnabled) {
            console.log('📝 Voice command received:', text);
            // Stop speech recognition while AI processes
            if (recognition) {
              try {
                recognition.stop();
              } catch (e) {
                // Ignore if already stopped
              }
            }
            socket.emit('chat_message', {message: text, session_id: currentSessionId});
            // Show AI processing indicator
            startAiProcessing();
          } else {
            console.log('❌ Speech detected but listening not enabled, ignoring');
          }
        });

        /* =============================================================================
           UI Helper Functions - Message display and utility functions
           ============================================================================= */
        // Add message to chat
        function addMessage(message, type) {
          const messageDiv = document.createElement('div');
          messageDiv.className = `message ${type}`;

          let bubbleClass = 'message-bubble';
          let content = message;

          if (type === 'voice') {
            bubbleClass += ' voice-input';
            content = `🎤 ${message}`;
            messageDiv.className = 'message user';
          }

          // Parse and render code blocks for AI messages
          if (type === 'ai') {
            content = renderMessageWithCodeBlocks(message);
          }

          messageDiv.innerHTML = `
                <div class="${bubbleClass}">
                    ${content}
                </div>
            `;

          // Insert before the AI processing indicator
          const processingIndicator = document.getElementById('ai-processing-indicator');
          chatMessages.insertBefore(messageDiv, processingIndicator);

          // Auto-scroll to show the new message at the bottom
          setTimeout(() => {
            try {
              messageDiv.scrollIntoView({behavior: 'smooth', block: 'end'});
            } catch (e) {
              messageDiv.scrollIntoView(false);
            }
          }, 100);
        }

        // Parse message text and render code blocks
        function renderMessageWithCodeBlocks(text) {
          // Match ```language ... ``` code blocks - handles various AI output formats
          // First try with language specifier: ```json ... ``` or ```json\n...\n```
          let result = text;

          // Pattern 1: ```language ... ``` (language directly after backticks, possibly with space)
          const pattern1 = /```(\w+)\s*([\s\S]*?)```/g;
          result = result.replace(pattern1, (match, language, code) => {
            const trimmedCode = code.trim();
            if (!trimmedCode) return '';
            const escapedCode = escapeHtml(trimmedCode);
            const highlightedCode = highlightJson(escapedCode);
            return `
          <div class="code-block">
            <div class="code-block-header">
              <span class="code-block-language">${language}</span>
              <button class="code-block-copy" onclick="copyCode(this, \`${escapeForAttribute(trimmedCode)}\`)">Copy</button>
            </div>
            <pre><code>${highlightedCode}</code></pre>
          </div>
        `;
          });

          // Pattern 2: ```\n...\n``` (just code block markers, no language)
          const pattern2 = /```\n?([\s\S]*?)```/g;
          result = result.replace(pattern2, (match, code) => {
            const trimmedCode = code.trim();
            if (!trimmedCode) return '';
            const escapedCode = escapeHtml(trimmedCode);
            const highlightedCode = highlightJson(escapedCode);
            return `
          <div class="code-block">
            <div class="code-block-header">
              <span class="code-block-language">code</span>
              <button class="code-block-copy" onclick="copyCode(this, \`${escapeForAttribute(trimmedCode)}\`)">Copy</button>
            </div>
            <pre><code>${highlightedCode}</code></pre>
          </div>
        `;
          });

          // Convert **bold** to HTML
          result = result.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

          // Convert newlines to <br> outside code blocks
          // Split by code blocks and convert newlines in text portions
          const parts = result.split(/(<div class="code-block">[\s\S]*?<\/div>)/g);
          result = parts.map(part => {
            if (part.startsWith('<div class="code-block">')) {
              return part;
            }
            return part.replace(/\n/g, '<br>');
          }).join('');

          return result;
        }

        // Escape HTML special characters
        function escapeHtml(text) {
          const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
          };
          return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Escape text for use in onclick attribute
        function escapeForAttribute(text) {
          return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        }

        // Simple JSON syntax highlighting
        function highlightJson(code) {
          // Only highlight if it looks like JSON (starts with { or [)
          const trimmed = code.trim();
          if (!trimmed.startsWith('{') && !trimmed.startsWith('[')) {
            return code; // Return as-is if not JSON-like
          }

          // Escape HTML first to prevent XSS and display issues
          let escaped = escapeHtml(code);

          // Apply highlighting patterns in the right order
          let highlighted = escaped
            // Keys (strings followed by colon)
            .replace(/"([^"\\]|\\.)*"\s*:/g, (match) => {
              return '<span class="json-key">' + match + '</span>';
            })
            // String values (colon followed by string)
            .replace(/:\s*("([^"\\]|\\.)*")/g, (match, full, inner) => {
              return ': <span class="json-string">' + full + '</span>';
            })
            // Numbers
            .replace(/:\s*(-?\d+\.?\d*)/g, (match, num) => {
              return ': <span class="json-number">' + num + '</span>';
            })
            // Booleans
            .replace(/:\s*(true|false)/g, (match, bool) => {
              return ': <span class="json-boolean">' + bool + '</span>';
            })
            // Null
            .replace(/:\s*(null)/g, (match, nullVal) => {
              return ': <span class="json-null">' + nullVal + '</span>';
            })
            // Brackets and braces last
            .replace(/([{}\[\]])/g, '<span class="json-bracket">$1</span>');

          return highlighted;
        }

        // Copy code to clipboard
        function copyCode(button, code) {
          navigator.clipboard.writeText(code).then(() => {
            button.textContent = 'Copied!';
            button.classList.add('copied');
            setTimeout(() => {
              button.textContent = 'Copy';
              button.classList.remove('copied');
            }, 2000);
          }).catch(err => {
            console.error('Failed to copy:', err);
            button.textContent = 'Failed';
          });
        }

        // Initialize speech recognition on page load
        initSpeechRecognition();

        // Auto-focus input on page load
        messageInput.focus();
      </script>
<script src="/static/js/voice.js"></script>
<script>
    // Initialize socket and voice client
    // Note: socket is already declared in the first script block
    let voiceClient = null;
    
    // Check auth and init voice
    fetch('/')
        .then(response => {
            if (response.status === 401) {
                window.location.href = '/login';
                return null;
            }
            return response.text();
        })
        .then(html => {
            if (html) {
                initVoice();
            }
        });
    
    function initVoice() {
        voiceClient = new VoiceClient(socket);
        
        voiceClient.setStatusCallback((status) => {
            const micBtn = document.getElementById('mic-btn');
            const statusText = document.getElementById('voice-status');
            if (micBtn && statusText) {
                if (status === 'listening') {
                    micBtn.classList.add('recording');
                    statusText.textContent = 'Listening...';
                } else if (status === 'processing') {
                    micBtn.classList.remove('recording');
                    statusText.textContent = 'Processing...';
                } else if (status === 'speaking') {
                    statusText.textContent = 'Speaking...';
                } else {
                    micBtn.classList.remove('recording');
                    statusText.textContent = '';
                }
            }
        });
        
        voiceClient.initTTS();
    }
    
    function toggleMic() {
        if (!voiceClient) {
            // Fallback to existing browser speech recognition
            if (listeningToggle) {
                listeningToggle.click();
            }
            return;
        }
        
        if (voiceClient.isRecording) {
            voiceClient.stopRecording();
        } else {
            voiceClient.startRecording();
        }
    }

    // Session management
    function toggleSidebar() {
        const sidebar = document.getElementById('sessions-sidebar');
        sidebar.classList.toggle('collapsed');
        document.body.classList.toggle('sidebar-collapsed');
        const toggleBtn = document.getElementById('sidebar-toggle');
        toggleBtn.textContent = sidebar.classList.contains('collapsed') ? '→' : '←';
    }

    document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);

    async function loadSessions() {
        try {
            const response = await fetch('/api/sessions');
            if (!response.ok) return;
            
            const sessions = await response.json();
            const list = document.getElementById('sessions-list');
            list.innerHTML = '';
            
            sessions.forEach(session => {
                const div = document.createElement('div');
                div.className = 'session-item' + (session.id === currentSessionId ? ' active' : '');
                div.innerHTML = `
                    <span class="session-name" data-id="${session.id}" ondblclick="renameSession(${session.id}, '${session.name}')">${session.name}</span>
                    <button class="delete-session" data-id="${session.id}">🗑️</button>
                `;
                div.onclick = (e) => {
                    if (e.target.classList.contains('delete-session')) {
                        // Handled by document click listener
                    } else {
                        switchSession(session.id);
                    }
                };
                list.appendChild(div);
            });
        } catch (err) {
            console.error('Failed to load sessions:', err);
        }
    }

    async function renameSession(sessionId, currentName) {
        const newName = prompt('Enter new session name:', currentName);
        if (newName && newName.trim() && newName.trim() !== currentName) {
            try {
                await fetch(`/api/sessions/${sessionId}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: newName.trim() })
                });
                await loadSessions();
            } catch (err) {
                console.error('Failed to rename session:', err);
            }
        }
    }

    async function switchSession(sessionId) {
        currentSessionId = sessionId;
        await loadSessions();
        await loadMessages();
        
        // Update active session name in header
        try {
            const response = await fetch('/api/sessions');
            const sessions = await response.json();
            const session = sessions.find(s => s.id === sessionId);
            if (session) {
                document.getElementById('current-session-name').textContent = session.name;
            }
        } catch (err) {
            console.error('Failed to get session name:', err);
        }
    }

    async function loadMessages() {
        if (!currentSessionId) return;
        
        try {
            const response = await fetch(`/api/sessions/${currentSessionId}/messages`);
            if (!response.ok) return;
            
            const messages = await response.json();
            
            // Clear existing messages except the welcome and processing indicator
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = `
                <div class="message system">
                    <div class="message-bubble">
                        👋 Welcome to Darvis! I'm your AI voice assistant. Type a message or enable listening mode to get started.
                    </div>
                </div>
                <div id="ai-processing-indicator" class="message ai" style="display: none;">
                    <div class="message-bubble">
                        <span id="ai-dots">...</span>
                        <span id="ai-timer">(0s)</span>
                        <button id="cancel-ai" class="cancel-button" title="Cancel AI request">❌</button>
                    </div>
                </div>
            `;
            
            messages.forEach(msg => {
                addMessage(msg.content, msg.role === 'user' ? 'user' : 'ai');
            });
        } catch (err) {
            console.error('Failed to load messages:', err);
        }
    }

    async function initApp() {
        console.log('initApp called');
        try {
            // Load user info
            const userResponse = await fetch('/api/user');
            console.log('User API status:', userResponse.status);
            if (userResponse.ok) {
                const user = await userResponse.json();
                console.log('User loaded:', user.username);
                document.getElementById('username-display').innerHTML = '👤 <strong>' + user.username + '</strong>';
            } else {
                console.error('User API failed');
                document.getElementById('username-display').textContent = 'Not logged in';
            }
            
            // Load sessions
            await loadSessions();
            
            // Switch to first session if none selected
            if (!currentSessionId) {
                const sessions = await (await fetch('/api/sessions')).json();
                if (sessions.length > 0) {
                    currentSessionId = sessions[0].id;
                    await loadSessions();
                    await loadMessages();
                }
            }
        } catch (err) {
            console.error('Failed to init app:', err);
        }
    }

    // New session button
    document.getElementById('new-session-btn').onclick = async () => {
        try {
            const response = await fetch('/api/sessions', { method: 'POST' });
            const session = await response.json();
            await loadSessions();
            await switchSession(session.id);
        } catch (err) {
            console.error('Failed to create session:', err);
        }
    };

    // Delete session button
    document.addEventListener('click', async (e) => {
        if (e.target.classList.contains('delete-session')) {
            const sessionId = parseInt(e.target.dataset.id);
            
            if (confirm('Delete this session? This cannot be undone.')) {
                try {
                    await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
                    
                    if (sessionId === currentSessionId) {
                        const sessions = await (await fetch('/api/sessions')).json();
                        if (sessions.length > 0) {
                            await switchSession(sessions[0].id);
                        } else {
                            // Create new session if all deleted
                            const newSession = await (await fetch('/api/sessions', { method: 'POST' })).json();
                            await switchSession(newSession.id);
                        }
                    } else {
                        await loadSessions();
                    }
                } catch (err) {
                    console.error('Failed to delete session:', err);
                }
            }
        }
    });

    // Initialize app
    initApp();
</script>
