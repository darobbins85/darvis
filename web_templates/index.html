<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darvis - Voice Assistant</title>
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <style>
    /* =============================================================================
       CSS Variables - Claude Dark Theme
       ============================================================================= */
    :root {
      /* Claude Dark Theme Colors */
      --bg-primary: #09090b;
      --bg-secondary: #111113;
      --bg-tertiary: #18181b;
      --bg-hover: rgba(255, 255, 255, 0.04);
      --bg-active: rgba(255, 255, 255, 0.06);
      --bg-000: #0a0a0c;
      --bg-100: #111113;
      --bg-200: #18181b;
      --bg-300: #27272a;

      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --text-500: #71717a;
      --text-200: #e4e4e7;
      --text-300: #a1a1aa;
      --text-400: #a1a1aa;

      --border: rgba(255, 255, 255, 0.08);
      --border-300: rgba(255, 255, 255, 0.15);
      --border-400: rgba(255, 255, 255, 0.2);
      --always-black: #000;

      --accent: #13c4ff;
      --accent-dim: rgba(19, 196, 255, 0.15);

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;

      --transition: 150ms ease;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;

      --sidebar-width: 18rem;
      --icon-rail-width: 48px;
    }

    /* =============================================================================
       Base Styles - Reset and modern fundamentals
       ============================================================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* =============================================================================
       Layout - App container with sidebar
       ============================================================================= */
    .app-container {
      display: flex;
      height: 100vh;
      position: relative;
    }

    .chat-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      margin-left: var(--icon-rail-width);
    }

    /* =============================================================================
       Icon Rail - Always visible sidebar
       ============================================================================= */
    .icon-rail {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--icon-rail-width);
      background: var(--bg-primary);
      border-right: 1px solid var(--border-300);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      z-index: 51;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .icon-rail::-webkit-scrollbar {
      display: none;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
      margin-bottom: 4px;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .rail-spacer {
      flex: 1;
      min-height: 8px;
    }

    .rail-sessions {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 4px 0;
    }

    .rail-sessions::-webkit-scrollbar {
      display: none;
    }

    #user-profile-btn {
      margin-top: auto;
      border-top: 1px solid var(--border-300);
      border-radius: 0;
      width: 100%;
    }

    #user-avatar {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .session-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 500;
      transition: all var(--transition);
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .session-icon:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .session-icon.active {
      background: var(--bg-active);
      color: var(--text-primary);
    }

    .session-icon .delete-session {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--bg-300);
      border: none;
      color: var(--text-muted);
      font-size: 0.6rem;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .session-icon:hover .delete-session {
      display: flex;
    }

    /* =============================================================================
       Sidebar - Claude Style (Expanded View)
       ============================================================================= */
    .sessions-sidebar {
      position: fixed;
      left: var(--icon-rail-width);
      top: 0;
      bottom: 0;
      width: calc(var(--sidebar-width) - var(--icon-rail-width));
      background: var(--bg-primary);
      border-right: 1px solid var(--border-300);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 50;
      transition: transform 0.2s ease, width 0.2s ease;
    }

    .sessions-sidebar.collapsed {
      transform: translateX(-100%);
      width: 0;
      overflow: hidden;
    }

    .sidebar-header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 4px 8px;
      min-height: 44px;
    }

    .sidebar-logo {
      display: none;
    }

    #new-session-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }

    #new-session-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .sidebar-nav {
      padding: 0 8px;
    }

    .sidebar-nav-text {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0 12px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .sidebar-action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 12px;
      border-radius: var(--radius-md);
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: background var(--transition);
    }

    .sidebar-action-btn:hover {
      background: var(--bg-hover);
    }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition);
      text-decoration: none;
      color: var(--text-primary);
      font-size: 0.875rem;
    }

    .sidebar-nav-item:hover {
      background: var(--bg-hover);
    }

    .sidebar-nav-item.active {
      background: var(--bg-active);
    }

    .sidebar-nav-item svg {
      width: 16px;
      height: 16px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .sessions-list-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0;
      margin-top: 8px;
    }

    .sessions-list {
      display: flex;
      flex-direction: column;
    }

    .session-item {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      height: 36px;
      padding: 0 8px 0 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition);
    }

    .session-item:hover {
      background: var(--bg-hover);
    }

    .session-item.active {
      background: var(--bg-active);
    }

    .session-item .session-number {
      width: 24px;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      flex-shrink: 0;
    }

    .session-item .session-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.875rem;
      color: var(--text-primary);
      margin-left: 0;
    }

    .session-item .delete-session {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 4px;
      border-radius: var(--radius-sm);
      opacity: 0;
      transition: all var(--transition);
    }

    .session-item:hover .delete-session {
      opacity: 1;
    }

    .session-item .delete-session:hover {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
    }

    .sidebar-footer {
      padding: 8px;
      border-top: 1px solid var(--border-300);
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
    }

    .sidebar-footer .username {
      font-size: 0.875rem;
      color: var(--text-primary);
    }

    .sidebar-footer a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.75rem;
      transition: color var(--transition);
    }

    .sidebar-footer a:hover {
      color: var(--text-primary);
    }

    /* Mobile sidebar */
    @media (max-width: 768px) {
      .sessions-sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
      }

      .sessions-sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 99;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .sidebar-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
    }

    .sessions-sidebar.collapsed {
      width: 0;
      transform: translateX(-100%);
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .sidebar-header h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-blue);
      letter-spacing: 0.02em;
    }

    #new-session-btn {
      background: var(--accent-blue-dim);
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: var(--accent-green);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }

    #new-session-btn:hover {
      background: rgba(0, 255, 136, 0.2);
      transform: scale(1.05);
    }

    .sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
    }

    .session-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.875rem 1rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      margin-bottom: 0.5rem;
      transition: all var(--transition-fast);
      background: transparent;
    }

    .session-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .session-item.active {
      background: var(--accent-blue-dim);
      border-left: 3px solid var(--accent-blue);
    }

    .session-item .session-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .session-item .delete-session {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.25rem 0.5rem;
      opacity: 0;
      transition: all var(--transition-fast);
      border-radius: var(--radius-sm);
    }

    .session-item:hover .delete-session {
      opacity: 1;
    }

    .session-item .delete-session:hover {
      color: var(--accent-red);
      background: rgba(255, 68, 68, 0.1);
    }

    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-footer .username {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-blue);
    }

    .sidebar-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color var(--transition-fast);
    }

    .sidebar-footer a:hover {
      color: var(--accent-blue);
    }

    /* Mobile sidebar */
    @media (max-width: 768px) {
      .sessions-sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 1002;
        transform: translateX(-100%);
        width: 280px;
      }

      .sessions-sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .sidebar-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
    }

    /* =============================================================================
       Header - Clean top bar
       ============================================================================= */
    .header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: var(--icon-rail-width);
      right: 0;
      background: var(--bg-primary);
      z-index: 20;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .logo img {
      height: 48px;
      width: auto;
    }

    /* =============================================================================
       Chat Container - Claude Style
       ============================================================================= */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 672px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
      padding-top: 60px;
      padding-bottom: 100px;
      overflow: hidden;
      min-height: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      padding-bottom: 120px;
      scroll-behavior: smooth;
      min-height: 0;
    }

    /* Scrollbar styling */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* =============================================================================
       Messages - Claude Style
       ============================================================================= */
    .message {
      margin-bottom: 24px;
      animation: messageIn 0.2s ease-out;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .message.ai {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .message.system {
      display: flex;
      justify-content: center;
    }

    .message-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      position: relative;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 0.9375rem;
      transition: transform var(--transition);
    }

    .message.user .message-bubble {
      background: var(--bg-300);
      color: var(--text-primary);
      border-bottom-right-radius: 4px;
    }

    .message.user .message-bubble:hover {
      transform: scale(1.01);
    }

    .message.ai .message-bubble {
      background: transparent;
      color: var(--text-primary);
    }

    .message.system .message-bubble {
      background: transparent;
      color: var(--text-muted);
      font-size: 0.875rem;
      text-align: center;
      padding: 8px 16px;
    }

    .message-actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .msg-action-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .msg-action-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .msg-action-btn.rated {
      color: var(--accent);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
      scroll-behavior: smooth;
      min-height: 0;
    }

    /* Scrollbar styling */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* =============================================================================
       Messages - Modern glass bubbles
       ============================================================================= */
    .message {
      margin-bottom: 1.25rem;
      animation: messageIn 0.3s ease-out;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      display: flex;
      justify-content: flex-end;
    }

    .message.ai {
      display: flex;
      justify-content: flex-start;
    }

    .message.system {
      display: flex;
      justify-content: center;
    }

    .message-bubble {
      max-width: 75%;
      padding: 0.875rem 1.125rem;
      border-radius: var(--radius-lg);
      position: relative;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 0.95rem;
      transition: transform var(--transition-fast);
    }

    .message.user .message-bubble {
      background: linear-gradient(135deg, #007aff, #0056d4);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
    }

    .message.user .message-bubble:hover {
      transform: scale(1.01);
    }

    .message.ai .message-bubble {
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-glass);
      color: var(--text-primary);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-soft);
    }

    .message.ai .message-bubble:hover {
      border-color: rgba(0, 212, 255, 0.3);
    }

    .message.system .message-bubble {
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      text-align: center;
    }

    /* Message timestamp */
    .message-timestamp {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.375rem;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .message:hover .message-timestamp {
      opacity: 1;
    }

    .message.user .message-timestamp {
      text-align: right;
      padding-right: 0.25rem;
    }

    .message.ai .message-timestamp {
      text-align: left;
      padding-left: 0.25rem;
    }

    /* =============================================================================
       Typing Indicator - Three dot animation
       ============================================================================= */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      margin: 0.5rem 0;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 0.75rem 1rem;
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: 6px;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--accent-blue);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0s; }

    @keyframes typingBounce {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* =============================================================================
       Input Area - Claude Style
       ============================================================================= */
    .input-container {
      position: fixed;
      bottom: 0;
      left: var(--icon-rail-width);
      right: 0;
      padding: 16px 24px 24px;
      background: var(--bg-primary);
    }

    .input-form {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg-000);
      border: 1px solid transparent;
      border-radius: var(--radius-xl);
      padding: 8px 16px 8px 16px;
      transition: box-shadow 0.2s ease;
      max-width: 800px;
      margin: 0 auto;
      /* Claude's multi-layer shadow */
      box-shadow: 
        0 0.25rem 1.25rem rgba(0, 0, 0, 0.35),
        0 0 0 0.5px rgba(255, 255, 255, 0.08);
    }

    .input-form:focus-within {
      box-shadow: 
        0 0.25rem 1.25rem rgba(0, 0, 0, 0.75),
        0 0 0 0.5px rgba(255, 255, 255, 0.15);
    }

            autocomplete="off">

      <script>
        /* =============================================================================
           Initialization - Socket connection and DOM element references
            ============================================================================= */
        const socket = io();
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const messageForm = document.getElementById('message-form');
        const listeningToggle = document.getElementById('mic-btn');
        const micBtn = document.getElementById('mic-btn');
        const sendButton = document.querySelector('.send-button');

        // Toggle send button active state based on input content
        messageInput.addEventListener('input', function() {
          if (messageInput.value.trim().length > 0) {
            sendButton.classList.add('active');
          } else {
            sendButton.classList.remove('active');
          }
        });

        /* =============================================================================
           State Variables - Track application state
           ============================================================================= */
        let listeningEnabled = false;
        let currentEyeState = 'idle'; // idle, wake, ai
        let recognition = null;
        let recognitionActive = false;
        let waitingForCommand = false;
        let currentSessionId = null;
        let commandTimeout = null;
        let aiProcessing = false;
        let aiStartTime = null;
        let aiTimerInterval = null;
        let restartPending = false;

        /* =============================================================================
           Eye State Control - Darvis logo image switching based on state
           ============================================================================= */
        // Eye control functions
        function setEyeState(state) {
          console.log('👁️ setEyeState called with:', state);
          const logoImgs = document.querySelectorAll('.darvis-logo');
          const timestamp = Date.now();

          // Change all logo images based on state
          logoImgs.forEach(logoImg => {
            if (state === 'wake') {
              console.log('👁️ Setting logo to green eyes');
              logoImg.src = '/static/darvis-logo-hires-green-eyes.png?v=' + timestamp;
            } else if (state === 'ai') {
              console.log('👁️ Setting logo to red eyes');
              logoImg.src = '/static/darvis-logo-hires-red-eyes.png?v=' + timestamp;
            } else {
              console.log('👁️ Setting logo to base');
              logoImg.src = '/static/darvis-logo.png?v=' + timestamp;
            }
          });

          currentEyeState = state;
        }

        /* =============================================================================
           AI Processing - Show/hide processing indicator during AI queries
           ============================================================================= */
        // AI Processing functions
        function startAiProcessing() {
          console.log('🤖 Starting AI processing...');
          aiProcessing = true;
          aiStartTime = Date.now();
          setEyeState('ai');

          // Show processing indicator
          const indicator = document.getElementById('ai-processing-indicator');
          indicator.style.display = 'block';

          // Start timer
          aiTimerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - aiStartTime) / 1000);
            document.getElementById('ai-timer').textContent = `(${elapsed}s)`;
          }, 1000);

          // Scroll to show the indicator
          indicator.scrollIntoView({behavior: 'smooth'});
        }

        function stopAiProcessing() {
          console.log('🤖 Stopping AI processing...');
          aiProcessing = false;
          clearInterval(aiTimerInterval);
          setEyeState('idle');

          // Hide processing indicator
          document.getElementById('ai-processing-indicator').style.display = 'none';
        }

        // Cancel AI processing
        document.addEventListener('DOMContentLoaded', () => {
          document.getElementById('cancel-ai').addEventListener('click', () => {
            console.log('❌ User cancelled AI request');
            stopAiProcessing();
            socket.emit('cancel_ai_request');
          });
        });

        /* =============================================================================
           Speech Recognition - Web Speech API initialization and handlers
           ============================================================================= */
        // Initialize speech recognition
        function initSpeechRecognition() {
          if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            // Try to improve recognition
            if (recognition.hasOwnProperty('maxAlternatives')) {
              recognition.maxAlternatives = 1;
            }

            recognition.onstart = function () {
              console.log('🎤 Speech recognition started');
              recognitionActive = true;
            };

            recognition.onresult = function (event) {
              const text = event.results[0][0].transcript;
              console.log('🎤 Browser heard:', text);
              socket.emit('speech_recognized', {text: text});
            };

            recognition.onerror = function (event) {
              console.error('🎤 Speech recognition error:', event.error);

              // Handle different error types
              if (event.error === 'no-speech') {
                console.log('🎤 No speech detected, restarting...');
                // Don't show "no-speech" errors to user, just restart
                if (listeningEnabled && !waitingForCommand && !restartPending) {
                  setTimeout(() => startListening(), 1500); // Wait longer before restart
                }
              } else if (event.error === 'not-allowed') {
                console.error('🎤 Microphone access denied:', event.error);
                listeningEnabled = false;
                listeningToggle.classList.remove('active');
              } else if (event.error === 'network') {
                console.error('🎤 Speech recognition network error:', event.error);
              } else {
                console.error('🎤 Speech recognition error:', event.error);
              }
            };

            recognition.onend = function () {
              console.log('🎤 Speech recognition ended');
              recognitionActive = false;
              // Restart listening if still enabled and not waiting for command
              if (listeningEnabled && !waitingForCommand && !restartPending) {
                setTimeout(() => startListening(), 1000);
              }
            };

            console.log('🎤 Speech recognition initialized');
          } else {
            console.error('🎤 Speech recognition not supported in this browser');
          }
        }

        function startListening() {
          if (recognition && listeningEnabled && !restartPending) {
            console.log('🎤 Starting browser speech recognition...');
            restartPending = true;
            try {
              recognition.start();
              restartPending = false;
            } catch (error) {
              console.error('🎤 Failed to start speech recognition:', error);
              restartPending = false;
              if (error.name === 'InvalidStateError') {
                console.log('🎤 Recognition already started, will retry later...');
                // Don't retry immediately to avoid spam
                setTimeout(() => {
                  if (listeningEnabled && !waitingForCommand) {
                    startListening();
                  }
                }, 2000);
              }
            }
          }
        }

        function stopListening() {
          if (recognition && recognitionActive) {
            console.log('🎤 Stopping browser speech recognition...');
            recognitionActive = false;
            try {
              recognition.stop();
            } catch (error) {
              console.error('🎤 Error stopping recognition:', error);
            }
          }
        }

        /* =============================================================================
           Event Handlers - Form submission and microphone toggle
           ============================================================================= */
        // Handle form submission
        messageForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const message = messageInput.value.trim();
          if (message) {
            // If we were waiting for a command, stop waiting
            if (waitingForCommand) {
              clearTimeout(commandTimeout);
              waitingForCommand = false;
              console.log('📝 Manual message sent, stopping command wait');
            }
            socket.emit('chat_message', {message: message, session_id: currentSessionId});
            messageInput.value = '';
            startAiProcessing();
          }
        });

        // Handle listening toggle
        listeningToggle.addEventListener('click', () => {
          listeningEnabled = !listeningEnabled;

          if (listeningEnabled) {
            listeningToggle.classList.add('active');
            setEyeState('wake'); // Green eyes when listening
            console.log('🎤 Listening mode enabled - using browser microphone');

            // Test microphone access
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
              navigator.mediaDevices.getUserMedia({audio: true})
                .then(function (stream) {
                  console.log('🎤 Microphone access granted');
                  stream.getTracks().forEach(track => track.stop()); // Stop the test stream
                  startListening();
                })
                .catch(function (error) {
                  console.error('🎤 Microphone access denied:', error);
                  listeningEnabled = false;
                  listeningToggle.classList.remove('active');
                });
            } else {
              // Fallback for older browsers
              startListening();
            }
          } else {
            listeningToggle.classList.remove('active');
            console.log('🎤 Listening mode disabled');
            stopListening();
            console.log('🎤 Setting eye state to idle');
            setEyeState('idle'); // Return to idle when listening disabled
            // Clear any pending command timeout
            if (commandTimeout) {
              clearTimeout(commandTimeout);
              commandTimeout = null;
            }
            waitingForCommand = false;
          }
        });

        /* =============================================================================
           Socket Event Handlers - Server-to-client communication
           ============================================================================= */
        // Handle incoming user messages
        socket.on('user_message', (data) => {
          addMessage(data.message, 'user');
        });

        // Handle incoming AI messages
        socket.on('ai_message', (data) => {
          stopAiProcessing();
          // If listening mode is still enabled, restart speech recognition for next command
          if (listeningEnabled) {
            console.log('🔄 Restarting speech recognition after AI response...');
            setEyeState('wake'); // Green eyes while waiting for next command
            setTimeout(() => {
              if (listeningEnabled) {
                startListening();
              }
            }, 1000);
          }
          addMessage(data.message, 'ai');
        });

        // Handle wake word detection
        socket.on('wake_word', (data) => {
          console.log('🎉 Wake word detected! Eyes turning green...');
          setEyeState('wake'); // Green eyes for wake word
        });

        // Handle AI cancellation
        socket.on('ai_cancelled', (data) => {
          console.log('❌ AI request cancelled');
          stopAiProcessing();
          // If listening mode is still enabled, restart speech recognition
          if (listeningEnabled) {
            console.log('🔄 Restarting speech recognition after AI cancellation...');
            setEyeState('wake'); // Green eyes while waiting for next command
            setTimeout(() => {
              if (listeningEnabled) {
                startListening();
              }
            }, 1000);
          }
        });

        // Handle speech recognized from browser
        socket.on('speech_recognized_response', (data) => {
          const text = data.text;
          console.log('📝 Processing recognized speech:', text);

          // If listening mode is enabled, process any speech as a command
          if (listeningEnabled) {
            console.log('📝 Voice command received:', text);
            // Stop speech recognition while AI processes
            if (recognition) {
              try {
                recognition.stop();
              } catch (e) {
                // Ignore if already stopped
              }
            }
            socket.emit('chat_message', {message: text, session_id: currentSessionId});
            // Show AI processing indicator
            startAiProcessing();
          } else {
            console.log('❌ Speech detected but listening not enabled, ignoring');
          }
        });

        /* =============================================================================
           UI Helper Functions - Message display and utility functions
           ============================================================================= */
        // Add message to chat
        function addMessage(message, type) {
          const messageDiv = document.createElement('div');
          messageDiv.className = `message ${type}`;

          let bubbleClass = 'message-bubble';
          let content = message;

          if (type === 'voice') {
            bubbleClass += ' voice-input';
            content = `🎤 ${message}`;
            messageDiv.className = 'message user';
          }

          // Parse and render code blocks for AI messages
          if (type === 'ai') {
            content = renderMessageWithCodeBlocks(message);
          }

          messageDiv.innerHTML = `
                <div class="${bubbleClass}">
                    ${content}
                </div>
            `;

          // Add action buttons for AI messages
          if (type === 'ai') {
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'message-actions';
            actionsDiv.innerHTML = `
              <button class="msg-action-btn" onclick="copyMessage(this)" title="Copy">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
              </button>
              <button class="msg-action-btn" onclick="rateMessage(this, 'up')" title="Good response">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
                </svg>
              </button>
              <button class="msg-action-btn" onclick="rateMessage(this, 'down')" title="Bad response">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zM17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"></path>
                </svg>
              </button>
            `;
            messageDiv.appendChild(actionsDiv);
          }

          // Insert before the AI processing indicator
          const processingIndicator = document.getElementById('ai-processing-indicator');
          chatMessages.insertBefore(messageDiv, processingIndicator);

          // Auto-scroll to show the new message at the bottom
          setTimeout(() => {
            try {
              messageDiv.scrollIntoView({behavior: 'smooth', block: 'end'});
            } catch (e) {
              messageDiv.scrollIntoView(false);
            }
          }, 100);
        }

        // Copy message to clipboard
        function copyMessage(btn) {
          const messageDiv = btn.closest('.message');
          const bubble = messageDiv.querySelector('.message-bubble');
          const text = bubble.innerText;
          navigator.clipboard.writeText(text).then(() => {
            btn.classList.add('rated');
            setTimeout(() => btn.classList.remove('rated'), 1000);
          });
        }

        // Rate message (thumbs up/down)
        function rateMessage(btn, rating) {
          const messageDiv = btn.closest('.message');
          // Remove existing ratings
          messageDiv.querySelectorAll('.msg-action-btn').forEach(b => {
            if (b !== btn) b.classList.remove('rated');
          });
          btn.classList.add('rated');
        }

        // Parse message text and render code blocks
        function renderMessageWithCodeBlocks(text) {
          // Match ```language ... ``` code blocks - handles various AI output formats
          // First try with language specifier: ```json ... ``` or ```json\n...\n```
          let result = text;

          // Pattern 1: ```language ... ``` (language directly after backticks, possibly with space)
          const pattern1 = /```(\w+)\s*([\s\S]*?)```/g;
          result = result.replace(pattern1, (match, language, code) => {
            const trimmedCode = code.trim();
            if (!trimmedCode) return '';
            const escapedCode = escapeHtml(trimmedCode);
            const highlightedCode = highlightJson(escapedCode);
            return `
          <div class="code-block">
            <div class="code-block-header">
              <span class="code-block-language">${language}</span>
              <button class="code-block-copy" onclick="copyCode(this, \`${escapeForAttribute(trimmedCode)}\`)">Copy</button>
            </div>
            <pre><code>${highlightedCode}</code></pre>
          </div>
        `;
          });

          // Pattern 2: ```\n...\n``` (just code block markers, no language)
          const pattern2 = /```\n?([\s\S]*?)```/g;
          result = result.replace(pattern2, (match, code) => {
            const trimmedCode = code.trim();
            if (!trimmedCode) return '';
            const escapedCode = escapeHtml(trimmedCode);
            const highlightedCode = highlightJson(escapedCode);
            return `
          <div class="code-block">
            <div class="code-block-header">
              <span class="code-block-language">code</span>
              <button class="code-block-copy" onclick="copyCode(this, \`${escapeForAttribute(trimmedCode)}\`)">Copy</button>
            </div>
            <pre><code>${highlightedCode}</code></pre>
          </div>
        `;
          });

          // Convert **bold** to HTML
          result = result.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

          // Convert newlines to <br> outside code blocks
          // Split by code blocks and convert newlines in text portions
          const parts = result.split(/(<div class="code-block">[\s\S]*?<\/div>)/g);
          result = parts.map(part => {
            if (part.startsWith('<div class="code-block">')) {
              return part;
            }
            return part.replace(/\n/g, '<br>');
          }).join('');

          return result;
        }

        // Escape HTML special characters
        function escapeHtml(text) {
          const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
          };
          return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Escape text for use in onclick attribute
        function escapeForAttribute(text) {
          return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        }

        // Simple JSON syntax highlighting
        function highlightJson(code) {
          // Only highlight if it looks like JSON (starts with { or [)
          const trimmed = code.trim();
          if (!trimmed.startsWith('{') && !trimmed.startsWith('[')) {
            return code; // Return as-is if not JSON-like
          }

          // Escape HTML first to prevent XSS and display issues
          let escaped = escapeHtml(code);

          // Apply highlighting patterns in the right order
          let highlighted = escaped
            // Keys (strings followed by colon)
            .replace(/"([^"\\]|\\.)*"\s*:/g, (match) => {
              return '<span class="json-key">' + match + '</span>';
            })
            // String values (colon followed by string)
            .replace(/:\s*("([^"\\]|\\.)*")/g, (match, full, inner) => {
              return ': <span class="json-string">' + full + '</span>';
            })
            // Numbers
            .replace(/:\s*(-?\d+\.?\d*)/g, (match, num) => {
              return ': <span class="json-number">' + num + '</span>';
            })
            // Booleans
            .replace(/:\s*(true|false)/g, (match, bool) => {
              return ': <span class="json-boolean">' + bool + '</span>';
            })
            // Null
            .replace(/:\s*(null)/g, (match, nullVal) => {
              return ': <span class="json-null">' + nullVal + '</span>';
            })
            // Brackets and braces last
            .replace(/([{}\[\]])/g, '<span class="json-bracket">$1</span>');

          return highlighted;
        }

        // Copy code to clipboard
        function copyCode(button, code) {
          navigator.clipboard.writeText(code).then(() => {
            button.textContent = 'Copied!';
            button.classList.add('copied');
            setTimeout(() => {
              button.textContent = 'Copy';
              button.classList.remove('copied');
            }, 2000);
          }).catch(err => {
            console.error('Failed to copy:', err);
            button.textContent = 'Failed';
          });
        }

        // Initialize speech recognition on page load
        initSpeechRecognition();

        // Auto-focus input on page load
        messageInput.focus();

<script src="/static/js/voice.js"></script>
<script>
    // Initialize socket and voice client
    // Note: socket is already declared in the first script block
    let voiceClient = null;
    
    // Check auth and init voice
    fetch('/')
        .then(response => {
            if (response.status === 401) {
                window.location.href = '/login';
                return null;
            }
            return response.text();
        })
        .then(html => {
            if (html) {
                initVoice();
            }
        });
    
    function initVoice() {
        voiceClient = new VoiceClient(socket);
        
        voiceClient.setStatusCallback((status) => {
            const micBtn = document.getElementById('mic-btn');
            const statusText = document.getElementById('voice-status');
            if (micBtn && statusText) {
                if (status === 'listening') {
                    micBtn.classList.add('recording');
                    statusText.textContent = 'Listening...';
                } else if (status === 'processing') {
                    micBtn.classList.remove('recording');
                    statusText.textContent = 'Processing...';
                } else if (status === 'speaking') {
                    statusText.textContent = 'Speaking...';
                } else {
                    micBtn.classList.remove('recording');
                    statusText.textContent = '';
                }
            }
        });
        
        voiceClient.initTTS();
    }
    
    function toggleMic() {
        if (!voiceClient) {
            // Fallback to existing browser speech recognition
            if (listeningToggle) {
                listeningToggle.click();
            }
            return;
        }
        
        if (voiceClient.isRecording) {
            voiceClient.stopRecording();
        } else {
            voiceClient.startRecording();
        }
    }

    // Session management
    function toggleSidebar() {
        const sidebar = document.getElementById('sessions-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        sidebar.classList.toggle('collapsed');
        sidebar.classList.toggle('open');
        document.body.classList.toggle('sidebar-collapsed');
        overlay.classList.toggle('active');
    }

    // Close sidebar when clicking overlay on mobile
    document.getElementById('sidebar-overlay').addEventListener('click', () => {
        const sidebar = document.getElementById('sessions-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (sidebar.classList.contains('open')) {
            toggleSidebar();
        }
    });

    document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);

    async function loadSessions() {
        try {
            const response = await fetch('/api/sessions');
            if (!response.ok) return;
            
            const sessions = await response.json();
            const list = document.getElementById('sessions-list');
            const railSessions = document.getElementById('rail-sessions');
            list.innerHTML = '';
            railSessions.innerHTML = '';
            
            sessions.forEach((session, index) => {
                const sessionNum = index + 1;
                const isActive = session.id === currentSessionId;
                
                // Create sidebar item (no number, just name)
                const div = document.createElement('div');
                div.className = 'session-item' + (isActive ? ' active' : '');
                div.innerHTML = `
                    <span class="session-name" data-id="${session.id}" ondblclick="renameSession(${session.id}, '${session.name.replace(/'/g, "\\'")}')">${session.name}</span>
                    <button class="delete-session" data-id="${session.id}">×</button>
                `;
                div.onclick = (e) => {
                    if (e.target.classList.contains('delete-session')) {
                        // Handled by document click listener
                    } else {
                        switchSession(session.id);
                    }
                };
                list.appendChild(div);
                
                // Create rail icon
                const iconBtn = document.createElement('button');
                iconBtn.className = 'session-icon' + (isActive ? ' active' : '');
                iconBtn.setAttribute('title', session.name);
                iconBtn.setAttribute('data-id', session.id);
                iconBtn.textContent = sessionNum;
                iconBtn.onclick = () => switchSession(session.id);
                railSessions.appendChild(iconBtn);
            });
        } catch (err) {
            console.error('Failed to load sessions:', err);
        }
    }

    async function renameSession(sessionId, currentName) {
        const newName = prompt('Enter new session name:', currentName);
        if (newName && newName.trim() && newName.trim() !== currentName) {
            try {
                await fetch(`/api/sessions/${sessionId}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: newName.trim() })
                });
                await loadSessions();
            } catch (err) {
                console.error('Failed to rename session:', err);
            }
        }
    }

    async function switchSession(sessionId) {
        currentSessionId = sessionId;
        await loadSessions();
        await loadMessages();
        
        // Update active session name in header
        try {
            const response = await fetch('/api/sessions');
            const sessions = await response.json();
            const session = sessions.find(s => s.id === sessionId);
            if (session) {
                document.getElementById('current-session-name').textContent = session.name;
            }
        } catch (err) {
            console.error('Failed to get session name:', err);
        }

        // Close sidebar on mobile after switching
        if (window.innerWidth <= 768) {
            const sidebar = document.getElementById('sessions-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                sidebar.classList.add('collapsed');
                overlay.classList.remove('active');
                document.body.classList.add('sidebar-collapsed');
            }
        }
    }

    async function loadMessages() {
        if (!currentSessionId) return;
        
        try {
            const response = await fetch(`/api/sessions/${currentSessionId}/messages`);
            if (!response.ok) return;
            
            const messages = await response.json();
            
            // Clear existing messages except the welcome and processing indicator
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = `
                <div class="message system">
                    <div class="message-bubble">
                        👋 Welcome to Darvis! I'm your AI voice assistant. Type a message or enable listening mode to get started.
                    </div>
                </div>
                <div id="ai-processing-indicator" class="message ai" style="display: none;">
                    <div class="message-bubble">
                        <span id="ai-dots">...</span>
                        <span id="ai-timer">(0s)</span>
                        <button id="cancel-ai" class="cancel-button" title="Cancel AI request">❌</button>
                    </div>
                </div>
            `;
            
            messages.forEach(msg => {
                addMessage(msg.content, msg.role === 'user' ? 'user' : 'ai');
            });
        } catch (err) {
            console.error('Failed to load messages:', err);
        }
    }

    async function initApp() {
        console.log('initApp called');
        try {
            // Load user info
            const userResponse = await fetch('/api/user');
            console.log('User API status:', userResponse.status);
            if (userResponse.ok) {
                const user = await userResponse.json();
                console.log('User loaded:', user.username);
                document.getElementById('username-display').innerHTML = '👤 <strong>' + user.username + '</strong>';
                document.getElementById('user-avatar').textContent = user.username.charAt(0).toUpperCase();
            } else {
                console.error('User API failed');
                document.getElementById('username-display').textContent = 'Not logged in';
                document.getElementById('user-avatar').textContent = '?';
            }
            
            // Load sessions
            await loadSessions();
            
            // Switch to first session if none selected
            if (!currentSessionId) {
                const sessions = await (await fetch('/api/sessions')).json();
                if (sessions.length > 0) {
                    currentSessionId = sessions[0].id;
                    await loadSessions();
                    await loadMessages();
                }
            }
        } catch (err) {
            console.error('Failed to init app:', err);
        }
    }

    // New session button
    document.getElementById('new-session-btn').onclick = async () => {
        try {
            const response = await fetch('/api/sessions', { method: 'POST' });
            const session = await response.json();
            await loadSessions();
            await switchSession(session.id);
        } catch (err) {
            console.error('Failed to create session:', err);
        }
    };

    // Delete session button
    document.addEventListener('click', async (e) => {
        if (e.target.classList.contains('delete-session')) {
            const sessionId = parseInt(e.target.dataset.id);
            
            if (confirm('Delete this session? This cannot be undone.')) {
                try {
                    await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
                    
                    if (sessionId === currentSessionId) {
                        const sessions = await (await fetch('/api/sessions')).json();
                        if (sessions.length > 0) {
                            await switchSession(sessions[0].id);
                        } else {
                            // Create new session if all deleted
                            const newSession = await (await fetch('/api/sessions', { method: 'POST' })).json();
                            await switchSession(newSession.id);
                        }
                    } else {
                        await loadSessions();
                    }
                } catch (err) {
                    console.error('Failed to delete session:', err);
                }
            }
        }
    });

    // Initialize app
    initApp();
</script>
