<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darvis - Voice Assistant</title>
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <style>
    /* =============================================================================
       CSS Variables - Modern theming system
       ============================================================================= */
    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #252542;
      --bg-glass: rgba(26, 26, 46, 0.8);
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #666680;
      --accent-blue: #00d4ff;
      --accent-blue-dim: rgba(0, 212, 255, 0.15);
      --accent-green: #00ff88;
      --accent-red: #ff4444;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-glass: rgba(255, 255, 255, 0.12);
      --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 20px rgba(0, 212, 255, 0.3);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
      --transition-slow: 400ms ease;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
    }

    /* =============================================================================
       Base Styles - Reset and modern fundamentals
       ============================================================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.02;
      pointer-events: none;
      z-index: 0;
    }

    /* =============================================================================
       Layout - App container with sidebar
       ============================================================================= */
    .app-container {
      display: flex;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    .chat-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* =============================================================================
       Sidebar - Glassmorphism sessions panel
       ============================================================================= */
    .sessions-sidebar {
      width: 280px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(180%);
      border-right: 1px solid var(--border-glass);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform var(--transition-slow), width var(--transition-slow);
    }

    .sessions-sidebar.collapsed {
      width: 0;
      transform: translateX(-100%);
    }

    #sidebar-toggle {
      position: fixed;
      top: 16px;
      left: 290px;
      z-index: 1001;
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-glass);
      color: var(--accent-blue);
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-normal);
    }

    #sidebar-toggle:hover {
      background: var(--accent-blue-dim);
      box-shadow: var(--shadow-glow);
    }

    body.sidebar-collapsed #sidebar-toggle {
      left: 16px;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .sidebar-header h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-blue);
      letter-spacing: 0.02em;
    }

    #new-session-btn {
      background: var(--accent-blue-dim);
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: var(--accent-green);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }

    #new-session-btn:hover {
      background: rgba(0, 255, 136, 0.2);
      transform: scale(1.05);
    }

    .sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
    }

    .session-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.875rem 1rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      margin-bottom: 0.5rem;
      transition: all var(--transition-fast);
      background: transparent;
    }

    .session-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .session-item.active {
      background: var(--accent-blue-dim);
      border-left: 3px solid var(--accent-blue);
    }

    .session-item .session-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .session-item .delete-session {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.25rem 0.5rem;
      opacity: 0;
      transition: all var(--transition-fast);
      border-radius: var(--radius-sm);
    }

    .session-item:hover .delete-session {
      opacity: 1;
    }

    .session-item .delete-session:hover {
      color: var(--accent-red);
      background: rgba(255, 68, 68, 0.1);
    }

    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-footer .username {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-blue);
    }

    .sidebar-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color var(--transition-fast);
    }

    .sidebar-footer a:hover {
      color: var(--accent-blue);
    }

    /* Mobile sidebar */
    @media (max-width: 768px) {
      .sessions-sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 1002;
        transform: translateX(-100%);
        width: 280px;
      }

      .sessions-sidebar.open {
        transform: translateX(0);
      }

      .sessions-sidebar.collapsed {
        width: 280px;
        transform: translateX(-100%);
      }

      #sidebar-toggle {
        left: 16px;
      }

      body:not(.sidebar-collapsed) #sidebar-toggle {
        left: 296px;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        z-index: 1001;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition-normal);
      }

      .sidebar-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
    }

    /* =============================================================================
       Header - Clean top bar
       ============================================================================= */
    .header {
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.875rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-blue), #007aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo img {
      height: 36px;
      width: auto;
      transition: transform var(--transition-normal);
    }

    /* =============================================================================
       Chat Container - Modern message area
       ============================================================================= */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
      overflow: hidden;
      min-height: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
      scroll-behavior: smooth;
      min-height: 0;
    }

    /* Scrollbar styling */
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* =============================================================================
       Messages - Modern glass bubbles
       ============================================================================= */
    .message {
      margin-bottom: 1.25rem;
      animation: messageIn 0.3s ease-out;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      display: flex;
      justify-content: flex-end;
    }

    .message.ai {
      display: flex;
      justify-content: flex-start;
    }

    .message.system {
      display: flex;
      justify-content: center;
    }

    .message-bubble {
      max-width: 75%;
      padding: 0.875rem 1.125rem;
      border-radius: var(--radius-lg);
      position: relative;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 0.95rem;
      transition: transform var(--transition-fast);
    }

    .message.user .message-bubble {
      background: linear-gradient(135deg, #007aff, #0056d4);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
    }

    .message.user .message-bubble:hover {
      transform: scale(1.01);
    }

    .message.ai .message-bubble {
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-glass);
      color: var(--text-primary);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-soft);
    }

    .message.ai .message-bubble:hover {
      border-color: rgba(0, 212, 255, 0.3);
    }

    .message.system .message-bubble {
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      text-align: center;
    }

    /* Message timestamp */
    .message-timestamp {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.375rem;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .message:hover .message-timestamp {
      opacity: 1;
    }

    .message.user .message-timestamp {
      text-align: right;
      padding-right: 0.25rem;
    }

    .message.ai .message-timestamp {
      text-align: left;
      padding-left: 0.25rem;
    }

    /* =============================================================================
       Typing Indicator - Three dot animation
       ============================================================================= */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      margin: 0.5rem 0;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 0.75rem 1rem;
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: 6px;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--accent-blue);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0s; }

    @keyframes typingBounce {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

        /* =============================================================================
       Input Area - Modern floating bar
       ============================================================================= */
    .input-container {
      padding: 1rem 0 1.5rem;
      margin-top: auto;
    }

    .input-form {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 0.75rem 1rem;
    }

    .darvis-logo-wrapper-bottom {
      flex-shrink: 0;
    }

    .darvis-logo-wrapper-bottom img {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      transition: transform var(--transition-normal);
    }

    .darvis-logo-wrapper-bottom img.ai-thinking {
      animation: think 1s ease-in-out infinite;
    }

    @keyframes think {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .message-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: all var(--transition-fast);
    }

    .message-input::placeholder {
      color: var(--text-muted);
    }

    .message-input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
    }

    .send-button {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .send-button:hover {
      background: #00b8e6;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
    }

    .send-button:active {
      transform: translateY(0);
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Listening controls */
    .listening-controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding-top: 0.5rem;
    }

    .listening-toggle {
      background: var(--accent-blue-dim);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: var(--accent-blue);
      padding: 0.5rem;
      border-radius: 50%;
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: 1rem;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .listening-toggle:hover {
      background: rgba(0, 212, 255, 0.2);
    }

    .listening-toggle.active {
      background: rgba(255, 68, 68, 0.2);
      border-color: var(--accent-red);
      color: var(--accent-red);
      animation: listeningPulse 1.5s infinite;
    }

    @keyframes listeningPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(255, 68, 68, 0); }
    }

    /* Recording indicator */
    .recording-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--accent-red);
      font-size: 0.85rem;
      animation: fadeIn 0.2s ease-out;
      margin-top: 0.5rem;
    }

    .recording-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-red);
      border-radius: 50%;
      animation: pulse-dot 1s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* =============================================================================
       Code Blocks - Modern syntax highlighting
       ============================================================================= */
    .code-block {
      background: #1e1e2e;
      border-radius: var(--radius-md);
      margin: 0.75rem 0;
      overflow: hidden;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .code-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2a2a3e;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .code-block-language {
      color: var(--accent-blue);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .code-block-copy {
      background: transparent;
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: var(--accent-blue);
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.7rem;
      transition: all var(--transition-fast);
    }

    .code-block-copy:hover {
      background: var(--accent-blue-dim);
    }

    .code-block-copy.copied {
      background: rgba(0, 255, 136, 0.15);
      border-color: var(--accent-green);
      color: var(--accent-green);
    }

    .code-block pre {
      margin: 0;
      padding: 1rem;
      overflow-x: auto;
    }

    .code-block code {
      font-family: inherit;
      color: #e0e0e0;
    }

    /* JSON syntax */
    .json-key { color: #ff79c6; }
    .json-string { color: #a6e3a1; }
    .json-number { color: #89b4fa; }
    .json-boolean { color: #f38ba8; }
    .json-null { color: #bac2de; }
    .json-bracket { color: #cdd6f4; }

    /* =============================================================================
       Welcome Screen
       ============================================================================= */
    .welcome-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .welcome-logo {
      width: 100px;
      height: 100px;
      margin-bottom: 1.5rem;
      opacity: 0.9;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-title {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-blue), #007aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }

    .welcome-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 380px;
      line-height: 1.6;
    }

    /* =============================================================================
       Mobile Responsive
       ============================================================================= */
    @media (max-width: 768px) {
      .chat-container {
        padding: 1rem;
      }

      .header {
        padding: 0.75rem 1rem;
      }

      .logo {
        font-size: 1.1rem;
      }

      .logo img {
        height: 32px;
      }

      .message-bubble {
        max-width: 85%;
        font-size: 0.9rem;
        padding: 0.75rem 1rem;
      }

      .input-container {
        padding: 0.875rem;
      }

      .message-input {
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
      }

      .send-button {
        padding: 0.625rem 1rem;
        font-size: 0.9rem;
      }

      .welcome-logo {
        width: 80px;
        height: 80px;
      }

      .welcome-title {
        font-size: 1.5rem;
      }

      .welcome-subtitle {
        font-size: 0.9rem;
      }
    }

    /* =============================================================================
       Animations
       ============================================================================= */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* AI processing */
    #ai-dots {
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.3; }
    }

    .cancel-button {
      background: transparent;
      border: none;
      color: var(--accent-red);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-sm);
      transition: all var(--transition-fast);
    }

    .cancel-button:hover {
      background: rgba(255, 68, 68, 0.15);
    }

    #mic-btn.recording {
      background: var(--accent-red);
      animation: none;
    }
  </style>


</head>

<body>

  <button id="sidebar-toggle" title="Toggle Sessions">←</button>

  <div class="app-container">
    <!-- Session Sidebar -->
    <aside class="sessions-sidebar" id="sessions-sidebar">
      <div class="sidebar-header">
        <h3>Sessions</h3>
        <button id="new-session-btn" title="New Session">+</button>
      </div>
      <div id="sessions-list" class="sessions-list">
        <!-- Sessions loaded dynamically -->
      </div>
      <div class="sidebar-footer">
        <span id="username-display" class="username">Loading...</span>
        <a href="/logout">Logout</a>
      </div>
    </aside>

    <!-- Mobile sidebar overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Chat Area -->
    <div class="chat-wrapper">
      <!-- Header -->
      <header class="header">
        <div class="logo">
          <img src="/static/darvis-logo.png" alt="Darvis">
          <span>Darvis</span>
        </div>
        <div id="current-session-name" style="color: var(--text-secondary); font-size: 0.9rem;"></div>
      </header>

      <div class="chat-container">

        <div id="chat-messages" class="chat-messages">
          <div class="message system">
            <div class="message-bubble">

      <script>
        /* =============================================================================
           Initialization - Socket connection and DOM element references
           ============================================================================= */
        const socket = io();
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const messageForm = document.getElementById('message-form');
        const listeningToggle = document.getElementById('mic-btn');
        const micBtn = document.getElementById('mic-btn');

        /* =============================================================================
           State Variables - Track application state
           ============================================================================= */
        let listeningEnabled = false;
        let currentEyeState = 'idle'; // idle, wake, ai
        let recognition = null;
        let recognitionActive = false;
        let waitingForCommand = false;
        let currentSessionId = null;
        let commandTimeout = null;
        let aiProcessing = false;
        let aiStartTime = null;
        let aiTimerInterval = null;
        let restartPending = false;

        /* =============================================================================
           Eye State Control - Darvis logo image switching based on state
           ============================================================================= */
        // Eye control functions
        function setEyeState(state) {
          console.log('👁️ setEyeState called with:', state);
          const logoImg = document.getElementById('darvis-logo-img');
          const timestamp = Date.now();

          // Change the logo image based on state
          if (state === 'wake') {
            console.log('👁️ Setting logo to green eyes');
            logoImg.src = '/static/darvis-logo-hires-green-eyes.png?v=' + timestamp;
          } else if (state === 'ai') {
            console.log('👁️ Setting logo to red eyes');
            logoImg.src = '/static/darvis-logo-hires-red-eyes.png?v=' + timestamp;
          } else {
            console.log('👁️ Setting logo to base');
            logoImg.src = '/static/darvis-logo.png?v=' + timestamp;
          }

          currentEyeState = state;
        }

        /* =============================================================================
           AI Processing - Show/hide processing indicator during AI queries
           ============================================================================= */
        // AI Processing functions
        function startAiProcessing() {
          console.log('🤖 Starting AI processing...');
          aiProcessing = true;
          aiStartTime = Date.now();
          setEyeState('ai');

          // Show processing indicator
          const indicator = document.getElementById('ai-processing-indicator');
          indicator.style.display = 'block';

          // Start timer
          aiTimerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - aiStartTime) / 1000);
            document.getElementById('ai-timer').textContent = `(${elapsed}s)`;
          }, 1000);

          // Scroll to show the indicator
          indicator.scrollIntoView({behavior: 'smooth'});
        }

        function stopAiProcessing() {
          console.log('🤖 Stopping AI processing...');
          aiProcessing = false;
          clearInterval(aiTimerInterval);
          setEyeState('idle');

          // Hide processing indicator
          document.getElementById('ai-processing-indicator').style.display = 'none';
        }

        // Cancel AI processing
        document.addEventListener('DOMContentLoaded', () => {
          document.getElementById('cancel-ai').addEventListener('click', () => {
            console.log('❌ User cancelled AI request');
            stopAiProcessing();
            socket.emit('cancel_ai_request');
          });
        });

        /* =============================================================================
           Speech Recognition - Web Speech API initialization and handlers
           ============================================================================= */
        // Initialize speech recognition
        function initSpeechRecognition() {
          if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            // Try to improve recognition
            if (recognition.hasOwnProperty('maxAlternatives')) {
              recognition.maxAlternatives = 1;
            }

            recognition.onstart = function () {
              console.log('🎤 Speech recognition started');
              recognitionActive = true;
            };

            recognition.onresult = function (event) {
              const text = event.results[0][0].transcript;
              console.log('🎤 Browser heard:', text);
              socket.emit('speech_recognized', {text: text});
            };

            recognition.onerror = function (event) {
              console.error('🎤 Speech recognition error:', event.error);

              // Handle different error types
              if (event.error === 'no-speech') {
                console.log('🎤 No speech detected, restarting...');
                // Don't show "no-speech" errors to user, just restart
                if (listeningEnabled && !waitingForCommand && !restartPending) {
                  setTimeout(() => startListening(), 1500); // Wait longer before restart
                }
              } else if (event.error === 'not-allowed') {
                console.error('🎤 Microphone access denied:', event.error);
                listeningEnabled = false;
                listeningToggle.classList.remove('active');
              } else if (event.error === 'network') {
                console.error('🎤 Speech recognition network error:', event.error);
              } else {
                console.error('🎤 Speech recognition error:', event.error);
              }
            };

            recognition.onend = function () {
              console.log('🎤 Speech recognition ended');
              recognitionActive = false;
              // Restart listening if still enabled and not waiting for command
              if (listeningEnabled && !waitingForCommand && !restartPending) {
                setTimeout(() => startListening(), 1000);
              }
            };

            console.log('🎤 Speech recognition initialized');
          } else {
            console.error('🎤 Speech recognition not supported in this browser');
          }
        }

        function startListening() {
          if (recognition && listeningEnabled && !restartPending) {
            console.log('🎤 Starting browser speech recognition...');
            restartPending = true;
            try {
              recognition.start();
              restartPending = false;
            } catch (error) {
              console.error('🎤 Failed to start speech recognition:', error);
              restartPending = false;
              if (error.name === 'InvalidStateError') {
                console.log('🎤 Recognition already started, will retry later...');
                // Don't retry immediately to avoid spam
                setTimeout(() => {
                  if (listeningEnabled && !waitingForCommand) {
                    startListening();
                  }
                }, 2000);
              }
            }
          }
        }

        function stopListening() {
          if (recognition && recognitionActive) {
            console.log('🎤 Stopping browser speech recognition...');
            recognitionActive = false;
            try {
              recognition.stop();
            } catch (error) {
              console.error('🎤 Error stopping recognition:', error);
            }
          }
        }

        /* =============================================================================
           Event Handlers - Form submission and microphone toggle
           ============================================================================= */
        // Handle form submission
        messageForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const message = messageInput.value.trim();
          if (message) {
            // If we were waiting for a command, stop waiting
            if (waitingForCommand) {
              clearTimeout(commandTimeout);
              waitingForCommand = false;
              console.log('📝 Manual message sent, stopping command wait');
            }
            socket.emit('chat_message', {message: message, session_id: currentSessionId});
            messageInput.value = '';
            startAiProcessing();
          }
        });

        // Handle listening toggle
        listeningToggle.addEventListener('click', () => {
          listeningEnabled = !listeningEnabled;

          if (listeningEnabled) {
            listeningToggle.classList.add('active');
            setEyeState('wake'); // Green eyes when listening
            console.log('🎤 Listening mode enabled - using browser microphone');

            // Test microphone access
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
              navigator.mediaDevices.getUserMedia({audio: true})
                .then(function (stream) {
                  console.log('🎤 Microphone access granted');
                  stream.getTracks().forEach(track => track.stop()); // Stop the test stream
                  startListening();
                })
                .catch(function (error) {
                  console.error('🎤 Microphone access denied:', error);
                  listeningEnabled = false;
                  listeningToggle.classList.remove('active');
                });
            } else {
              // Fallback for older browsers
              startListening();
            }
          } else {
            listeningToggle.classList.remove('active');
            console.log('🎤 Listening mode disabled');
            stopListening();
            console.log('🎤 Setting eye state to idle');
            setEyeState('idle'); // Return to idle when listening disabled
            // Clear any pending command timeout
            if (commandTimeout) {
              clearTimeout(commandTimeout);
              commandTimeout = null;
            }
            waitingForCommand = false;
          }
        });

        /* =============================================================================
           Socket Event Handlers - Server-to-client communication
           ============================================================================= */
        // Handle incoming user messages
        socket.on('user_message', (data) => {
          addMessage(data.message, 'user');
        });

        // Handle incoming AI messages
        socket.on('ai_message', (data) => {
          stopAiProcessing();
          // If listening mode is still enabled, restart speech recognition for next command
          if (listeningEnabled) {
            console.log('🔄 Restarting speech recognition after AI response...');
            setEyeState('wake'); // Green eyes while waiting for next command
            setTimeout(() => {
              if (listeningEnabled) {
                startListening();
              }
            }, 1000);
          }
          addMessage(data.message, 'ai');
        });

        // Handle wake word detection
        socket.on('wake_word', (data) => {
          console.log('🎉 Wake word detected! Eyes turning green...');
          setEyeState('wake'); // Green eyes for wake word
        });

        // Handle AI cancellation
        socket.on('ai_cancelled', (data) => {
          console.log('❌ AI request cancelled');
          stopAiProcessing();
          // If listening mode is still enabled, restart speech recognition
          if (listeningEnabled) {
            console.log('🔄 Restarting speech recognition after AI cancellation...');
            setEyeState('wake'); // Green eyes while waiting for next command
            setTimeout(() => {
              if (listeningEnabled) {
                startListening();
              }
            }, 1000);
          }
        });

        // Handle speech recognized from browser
        socket.on('speech_recognized_response', (data) => {
          const text = data.text;
          console.log('📝 Processing recognized speech:', text);

          // If listening mode is enabled, process any speech as a command
          if (listeningEnabled) {
            console.log('📝 Voice command received:', text);
            // Stop speech recognition while AI processes
            if (recognition) {
              try {
                recognition.stop();
              } catch (e) {
                // Ignore if already stopped
              }
            }
            socket.emit('chat_message', {message: text, session_id: currentSessionId});
            // Show AI processing indicator
            startAiProcessing();
          } else {
            console.log('❌ Speech detected but listening not enabled, ignoring');
          }
        });

        /* =============================================================================
           UI Helper Functions - Message display and utility functions
           ============================================================================= */
        // Add message to chat
        function addMessage(message, type) {
          const messageDiv = document.createElement('div');
          messageDiv.className = `message ${type}`;

          let bubbleClass = 'message-bubble';
          let content = message;

          if (type === 'voice') {
            bubbleClass += ' voice-input';
            content = `🎤 ${message}`;
            messageDiv.className = 'message user';
          }

          // Parse and render code blocks for AI messages
          if (type === 'ai') {
            content = renderMessageWithCodeBlocks(message);
          }

          messageDiv.innerHTML = `
                <div class="${bubbleClass}">
                    ${content}
                </div>
            `;

          // Insert before the AI processing indicator
          const processingIndicator = document.getElementById('ai-processing-indicator');
          chatMessages.insertBefore(messageDiv, processingIndicator);

          // Auto-scroll to show the new message at the bottom
          setTimeout(() => {
            try {
              messageDiv.scrollIntoView({behavior: 'smooth', block: 'end'});
            } catch (e) {
              messageDiv.scrollIntoView(false);
            }
          }, 100);
        }

        // Parse message text and render code blocks
        function renderMessageWithCodeBlocks(text) {
          // Match ```language ... ``` code blocks - handles various AI output formats
          // First try with language specifier: ```json ... ``` or ```json\n...\n```
          let result = text;

          // Pattern 1: ```language ... ``` (language directly after backticks, possibly with space)
          const pattern1 = /```(\w+)\s*([\s\S]*?)```/g;
          result = result.replace(pattern1, (match, language, code) => {
            const trimmedCode = code.trim();
            if (!trimmedCode) return '';
            const escapedCode = escapeHtml(trimmedCode);
            const highlightedCode = highlightJson(escapedCode);
            return `
          <div class="code-block">
            <div class="code-block-header">
              <span class="code-block-language">${language}</span>
              <button class="code-block-copy" onclick="copyCode(this, \`${escapeForAttribute(trimmedCode)}\`)">Copy</button>
            </div>
            <pre><code>${highlightedCode}</code></pre>
          </div>
        `;
          });

          // Pattern 2: ```\n...\n``` (just code block markers, no language)
          const pattern2 = /```\n?([\s\S]*?)```/g;
          result = result.replace(pattern2, (match, code) => {
            const trimmedCode = code.trim();
            if (!trimmedCode) return '';
            const escapedCode = escapeHtml(trimmedCode);
            const highlightedCode = highlightJson(escapedCode);
            return `
          <div class="code-block">
            <div class="code-block-header">
              <span class="code-block-language">code</span>
              <button class="code-block-copy" onclick="copyCode(this, \`${escapeForAttribute(trimmedCode)}\`)">Copy</button>
            </div>
            <pre><code>${highlightedCode}</code></pre>
          </div>
        `;
          });

          // Convert **bold** to HTML
          result = result.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

          // Convert newlines to <br> outside code blocks
          // Split by code blocks and convert newlines in text portions
          const parts = result.split(/(<div class="code-block">[\s\S]*?<\/div>)/g);
          result = parts.map(part => {
            if (part.startsWith('<div class="code-block">')) {
              return part;
            }
            return part.replace(/\n/g, '<br>');
          }).join('');

          return result;
        }

        // Escape HTML special characters
        function escapeHtml(text) {
          const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
          };
          return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Escape text for use in onclick attribute
        function escapeForAttribute(text) {
          return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/`/g, '\\`').replace(/\$/g, '\\$');
        }

        // Simple JSON syntax highlighting
        function highlightJson(code) {
          // Only highlight if it looks like JSON (starts with { or [)
          const trimmed = code.trim();
          if (!trimmed.startsWith('{') && !trimmed.startsWith('[')) {
            return code; // Return as-is if not JSON-like
          }

          // Escape HTML first to prevent XSS and display issues
          let escaped = escapeHtml(code);

          // Apply highlighting patterns in the right order
          let highlighted = escaped
            // Keys (strings followed by colon)
            .replace(/"([^"\\]|\\.)*"\s*:/g, (match) => {
              return '<span class="json-key">' + match + '</span>';
            })
            // String values (colon followed by string)
            .replace(/:\s*("([^"\\]|\\.)*")/g, (match, full, inner) => {
              return ': <span class="json-string">' + full + '</span>';
            })
            // Numbers
            .replace(/:\s*(-?\d+\.?\d*)/g, (match, num) => {
              return ': <span class="json-number">' + num + '</span>';
            })
            // Booleans
            .replace(/:\s*(true|false)/g, (match, bool) => {
              return ': <span class="json-boolean">' + bool + '</span>';
            })
            // Null
            .replace(/:\s*(null)/g, (match, nullVal) => {
              return ': <span class="json-null">' + nullVal + '</span>';
            })
            // Brackets and braces last
            .replace(/([{}\[\]])/g, '<span class="json-bracket">$1</span>');

          return highlighted;
        }

        // Copy code to clipboard
        function copyCode(button, code) {
          navigator.clipboard.writeText(code).then(() => {
            button.textContent = 'Copied!';
            button.classList.add('copied');
            setTimeout(() => {
              button.textContent = 'Copy';
              button.classList.remove('copied');
            }, 2000);
          }).catch(err => {
            console.error('Failed to copy:', err);
            button.textContent = 'Failed';
          });
        }

        // Initialize speech recognition on page load
        initSpeechRecognition();

        // Auto-focus input on page load
        messageInput.focus();
      </script>

<script>

            const list = document.getElementById('sessions-list');

                            // Create new session if all deleted
                            const newSession = await (await fetch('/api/sessions', { method: 'POST' })).json();
                            await switchSession(newSession.id);
                        }
                    } else {
                        await loadSessions();
                    }
                } catch (err) {
                    console.error('Failed to delete session:', err);
                }
            }
        }
    });

    // Initialize app
    initApp();
</script>
</div>  <!-- Close chat-container -->
</div>  <!-- Close chat-wrapper -->
</div>  <!-- Close app-container -->
</body>
